<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SpongeBob Register</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700;900&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Bungee&display=swap" rel="stylesheet">
</head>
<body>
    <div class="login-container">
        <div class="login-image">
            <img src="Suoc-Anh/z7699750891590_8538b07e8277c72be0c8544a110c1012.jpg" alt="SpongeBob Background">
        </div>

        <div class="login-form-section">
            <div class="top-header-bar">
                <h1>ĐĂNG KÝ</h1>
            </div>

            <div class="form-content">
                <div class="social-login">
                    <button class="btn-social google">
                        <img src="Suoc-Anh/pngtree-google-logo-vector-png-image_12256710.png" alt="Google">
                        Đăng Ký bằng Google
                    </button>
                    <button class="btn-social facebook">
                        <img src="https://upload.wikimedia.org/wikipedia/commons/0/05/Facebook_Logo_%282019%29.png" alt="Facebook">
                        Đăng Ký bằng Facebook
                    </button>
                </div>

                <div class="divider">
                    <span>hoặc Email</span>
                </div>

                <form id="registerForm"> <!--Thêm id="registerForm"-->
                    <div class="input-group">
                        <label>Email</label>
                        <input type="email" id="regEmail" placeholder="Nhập địa chỉ Email của bạn" required> <!--Sửa type, thêm id và required-->
                    </div>

                    <div class="input-group">
                        <label>Tên người dùng</label>
                        <input type="text" id="regUsername" placeholder="Nhập tên người dùng của bạn" required> <!-- thêm id và required-->
                    </div>

                    <div class="input-group">
                        <label>Mật Khẩu</label>
                        <input type="password" id="regPassword" placeholder="Nhập Mật Khẩu của bạn" required>
                    </div>

                    <div class="input-group">
                        <label>Xác nhận Mật khẩu</label>
                        <input type="password" id="regConfirmPassword" placeholder="Nhập lại Mật Khẩu của bạn" required>
                    </div>

                    <div class="terms-group">
                        <input type="checkbox" id="terms" >
                        <label for="terms">Tôi đồng ý với các điều khoản</label>
                    </div>

                    <button type="submit" class="login-submit-btn">ĐĂNG KÝ</button>
                </form>
            </div>
        </div>
    </div>

    <script src="jstest.js"></script>
</body>
</html>
